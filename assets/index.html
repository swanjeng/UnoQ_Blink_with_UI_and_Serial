<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blink with UI and Serial</title>

    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div>
        <div class="header">
            <h1 class="arduino-text">Blink with UI and Serial</h1>
        </div>


        <div class="container">
            <!-- LED Button with integrated text -->
            <div class="led-container">
                <button id="led-button" class="led-off">
                    <span id="led-text">LED IS OFF</span>
                </button>
            </div>

            <!-- Instruction Text -->
            <p class="instruction-text">Click to control board's LED 👆</p>

            <!-- Error message container -->
            <div id="error-container" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <script src="libs/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
